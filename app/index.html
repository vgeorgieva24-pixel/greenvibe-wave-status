<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<title>GreenVibe.Wave — MVP Prototype v0.2</title>
<style>
:root{--green:#2e7d32;--dark:#1b5e20;--light:#e8f3e8;--amber:#b47d00;--red:#c0392b;--grey:#6b7a6d}
*{box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;margin:0;background:#f4f7f4;color:#212121}
header{background:linear-gradient(120deg,var(--dark),var(--green));color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{margin:0;font-size:20px}
header .tag{font-size:11px;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:999px;margin-left:10px;vertical-align:middle}
nav{display:flex;gap:6px;flex-wrap:wrap}
nav button{border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.15);color:#fff}
nav button.active{background:#fff;color:var(--dark)}
main{max-width:1100px;margin:0 auto;padding:24px 28px}
.card{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h2{font-size:15px;color:var(--dark);margin:0 0 12px}
h3{font-size:13px;color:var(--green);margin:14px 0 6px}
.row{display:flex;gap:18px;flex-wrap:wrap}
.row .card{flex:1;min-width:280px}
.stat{display:inline-block;margin:0 26px 8px 0}
.stat .v{font-size:24px;font-weight:700;color:var(--dark)}
.stat .l{font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.05em}
label{display:block;font-size:12px;color:var(--grey);margin:10px 0 4px;font-weight:600}
input,select{width:100%;padding:9px 10px;border:1px solid #cfd8cf;border-radius:7px;font-size:14px;background:#fff}
button.act{background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;margin-top:12px}
button.act:hover{background:var(--dark)}
button.sec{background:#eef2ee;color:var(--dark);border:1px solid #cfd8cf;padding:7px 14px;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;margin:4px 6px 0 0}
button.danger{background:#fbeaea;color:var(--red);border:1px solid #eec7c7}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#546e57;font-size:11px;text-transform:uppercase;border-bottom:2px solid #dfe7df;padding:7px 8px}
td{padding:8px;border-bottom:1px solid #eef2ee;vertical-align:top}
.pill{padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.s-Funded{background:#fff3cd;color:var(--amber)} .s-Available{background:#e3f0fb;color:#1d6fa5}
.s-Claimed{background:#f3e8fa;color:#8e44ad} .s-Submitted{background:#fdebd0;color:#ad6800}
.s-Validated{background:var(--light);color:var(--green)} .s-Rejected{background:#f8d7da;color:var(--red)}
.muted{color:var(--grey);font-size:12px}
.banner{background:var(--light);border-left:4px solid var(--green);padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:13px 20px;border-radius:9px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.25);opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px;z-index:9}
.toast.show{opacity:1}
.evid{max-width:120px;max-height:80px;border-radius:6px;border:1px solid #dfe7df;margin:4px 6px 0 0}
.impact{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.itile{background:var(--light);border-radius:9px;padding:12px 16px;min-width:120px}
.itile .v{font-size:20px;font-weight:700;color:var(--dark)} .itile .l{font-size:11px;color:var(--grey)}
.xpbar{background:#e0e6e0;border-radius:999px;height:14px;overflow:hidden;margin:6px 0 2px}
.xpfill{background:linear-gradient(90deg,#43a047,#2e7d32);height:100%;border-radius:999px;transition:width .4s}
.lvl{display:inline-block;background:var(--dark);color:#fff;border-radius:999px;padding:3px 12px;font-size:12px;font-weight:700}
.zone{cursor:pointer}
.zone:hover .zshape{fill:#cfe6cf}
.zshape{fill:#e0eee0;stroke:#8fbc94;stroke-width:1.5;transition:fill .2s}
.zshape.sel{fill:#bcd9bf}
.zlabel{font-size:11px;fill:#33513a;font-weight:600}
.pin{cursor:pointer}
.preview{max-width:160px;max-height:110px;border-radius:8px;border:2px solid var(--light);display:block;margin-top:6px}
footer{text-align:center;color:var(--grey);font-size:11.5px;padding:18px}
</style>
</head>
<body>
<header>
  <h1><a href="../" style="color:#fff;text-decoration:none" title="Back to home">GreenVibe.Wave</a> <span class="tag">MVP Prototype v0.2 — mock payments, local data</span></h1>
  <nav id="nav"></nav>
</header>
<main id="main"></main>
<footer>Prototype runs entirely in your browser (localStorage). Reset data from the Admin tab. Built with Claude — v0.2, session 2026-07-05.</footer>
<div class="toast" id="toast"></div>

<script>
/* ===== Domain parameters — from Impact Calculator.xlsx ===== */
const P = {
  BGN_EUR: 0.51129, EUR_EC: 0.9975, EC_PER_KG: 10,
  KG_PER_M2: 0.0105, CO2_PER_KG: 3,
  KC_PER_KG: 1.0, KC_MISSION_BONUS: 5,
  XP_PER_MISSION: 20, XP_PER_KG: 10
};
/* Doer Maturity (deck S80-S81 XP-based model; level names provisional — TODO cross-check with deck v1.3 naming) */
const LEVELS = [
  {n:1, name:"Level 1 · First Steps", xp:0},
  {n:2, name:"Level 2 · Earth Keeper", xp:50},
  {n:3, name:"Level 3 · Trail Guardian", xp:150},
  {n:4, name:"Level 4 · Nature Custodian", xp:400},
  {n:5, name:"Level 5 · Wave Maker", xp:900}
];
/* Zones with schematic map coordinates (stylized BG map, not geographic) */
const ZONES = [
  {id:"Z1", name:"Sofia — Borisova Gradina",   x:150, y:150},
  {id:"Z2", name:"Sofia — Vitosha Foothills",  x:120, y:210},
  {id:"Z3", name:"Plovdiv — Maritsa Riverbank",x:300, y:220},
  {id:"Z4", name:"Varna — Asparuhovo Beach",   x:520, y:120}
];
const STATUS_COLOR = { Available:"#1d6fa5", Claimed:"#8e44ad", Submitted:"#ad6800", Validated:"#2e7d32", Rejected:"#c0392b" };

/* ===== State (with migration from v0) ===== */
const DB_KEY = "gvw_proto_v0";
let db = JSON.parse(localStorage.getItem(DB_KEY) || "null") || { ecLedger:[], missions:[], kc:{"Maria (Doer)":0}, seq:1 };
if (db.xp === undefined) db.xp = { "Maria (Doer)": 0 };
db.missions.forEach(m => { if (m.evidence && m.evidence.photo !== undefined && m.evidence.before === undefined) { m.evidence.before = null; m.evidence.after = m.evidence.photo; } });
function save(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 3400); }
function fmt(n,d=2){ return Number(n).toLocaleString("en-US",{maximumFractionDigits:d,minimumFractionDigits:0}); }
function ts(){ return new Date().toISOString().slice(0,16).replace("T"," "); }

/* ===== Domain logic ===== */
function bgnToEC(bgn){ return bgn * P.BGN_EUR * P.EUR_EC; }
function levelFor(xp){ let L=LEVELS[0]; for(const l of LEVELS){ if(xp>=l.xp) L=l; } return L; }
function nextLevel(xp){ return LEVELS.find(l=>l.xp>xp) || null; }

function fundMission(zoneName, bgn){
  const ec = bgnToEC(bgn), kg = ec / P.EC_PER_KG;
  const m = { id:"GV-"+String(db.seq++).padStart(3,"0"), zone:zoneName, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
              status:"Available", patron:"Val (Patron)", doer:null, evidence:null,
              history:[ts()+" — Funded with "+fmt(bgn)+" BGN → "+fmt(ec)+" EC (mock payment)"] };
  db.ecLedger.push({ ts:ts(), who:"Val (Patron)", type:"Funding", ec:m.ec, note:m.id+" · "+zoneName });
  db.missions.unshift(m); save(); return m;
}
function claim(id){ const m=get(id); m.status="Claimed"; m.doer="Maria (Doer)"; m.history.push(ts()+" — Claimed by Maria"); save(); }
function submitEvidence(id, before, after, gps){
  const m=get(id); m.status="Submitted";
  m.evidence={ before, after, gps, ts:ts() };
  m.history.push(ts()+" — Evidence submitted (before/after photos + GPS "+gps+")"); save();
}
function validate(id, ok){
  const m=get(id);
  if(ok){
    m.status="Validated";
    const kc = Math.round(m.kg * P.KC_PER_KG + P.KC_MISSION_BONUS);
    const xp = Math.round(P.XP_PER_MISSION + m.kg * P.XP_PER_KG);
    db.kc[m.doer]=(db.kc[m.doer]||0)+kc;
    const before = levelFor(db.xp[m.doer]||0);
    db.xp[m.doer]=(db.xp[m.doer]||0)+xp;
    const afterL = levelFor(db.xp[m.doer]);
    db.ecLedger.push({ ts:ts(), who:m.doer, type:"Redemption accrual", ec:m.ec, note:m.id+" validated → EC accrues to Doer (cash-out disabled in pilot)" });
    m.history.push(ts()+" — Validated. +"+kc+" KC, +"+xp+" XP to "+m.doer+". Impact credited to "+m.patron);
    if(afterL.n>before.n){ m.history.push(ts()+" — "+m.doer+" leveled up: "+afterL.name); m._levelUp=afterL.name; }
  } else { m.status="Rejected"; m.history.push(ts()+" — Rejected by admin review"); }
  save();
}
function get(id){ return db.missions.find(m=>m.id===id); }
function impactFor(filter){
  const v = db.missions.filter(m=>m.status==="Validated" && (!filter||m.patron===filter));
  const kg = v.reduce((s,m)=>s+m.kg,0);
  return { missions:v.length, kg, m2:kg/P.KG_PER_M2, co2:kg*P.CO2_PER_KG };
}

/* ===== Views ===== */
const VIEWS = ["Patron","Doer","Map","Admin","Ledger"];
let view="Patron", selZone=null;
function nav(){ document.getElementById("nav").innerHTML = VIEWS.map(v=>`<button class="${v===view?'active':''}" onclick="go('${v}')">${v}</button>`).join(""); }
function go(v){ view=v; render(); }
function pill(s){ return `<span class="pill s-${s}">${s}</span>`; }

function missionTable(list, actions){
  if(!list.length) return `<p class="muted">Nothing here yet.</p>`;
  return `<table><tr><th>ID</th><th>Zone</th><th>EC</th><th>Target kg</th><th>Status</th><th>Doer</th><th></th></tr>`+
    list.map(m=>`<tr><td>${m.id}</td><td>${m.zone}</td><td>${fmt(m.ec)}</td><td>${fmt(m.kg)}</td>
      <td>${pill(m.status)}</td><td>${m.doer||"—"}</td><td>${actions?actions(m):""}</td></tr>`).join("")+`</table>`;
}

/* ---- Map view: stylized SVG (schematic, not geographic) ---- */
function mapSVG(){
  const pins = db.missions.filter(m=>m.status!=="Rejected").map((m,i)=>{
    const z = ZONES.find(z=>z.name===m.zone); if(!z) return "";
    const angle = i*2.4, r = 14 + (i%3)*11;
    const px = z.x + Math.cos(angle)*r, py = z.y + Math.sin(angle)*r*0.6;
    return `<g class="pin" onclick="toast('${m.id} · ${m.status} · ${fmt(m.kg)} kg')">
      <circle cx="${px}" cy="${py}" r="7" fill="${STATUS_COLOR[m.status]||'#999'}" stroke="#fff" stroke-width="1.6"/>
    </g>`;
  }).join("");
  const zones = ZONES.map(z=>{
    const count = db.missions.filter(m=>m.zone===z.name && m.status!=="Rejected").length;
    return `<g class="zone" onclick="selectZone('${z.id}')">
      <ellipse class="zshape ${selZone===z.id?'sel':''}" cx="${z.x}" cy="${z.y}" rx="52" ry="34"/>
      <text class="zlabel" x="${z.x}" y="${z.y-40}" text-anchor="middle">${z.name.split(" — ")[0]}</text>
      <text class="zlabel" x="${z.x}" y="${z.y+50}" text-anchor="middle" style="fill:#6b7a6d;font-weight:400">${count} mission${count===1?"":"s"}</text>
    </g>`;
  }).join("");
  return `<svg viewBox="0 0 640 300" style="width:100%;max-width:760px;background:linear-gradient(180deg,#f0f7f0,#e6f0e9);border-radius:10px">
    <path d="M40,90 Q140,30 320,55 Q520,20 600,80 Q625,160 570,215 Q470,275 300,258 Q130,278 60,215 Q20,150 40,90 Z"
          fill="#f7fbf7" stroke="#c9dcc9" stroke-width="2"/>
    ${zones}${pins}
    <text x="18" y="290" style="font-size:10px;fill:#8aa08e">Schematic map (v0.2) — real geo tiles arrive with the production map</text>
  </svg>`;
}
function selectZone(id){ selZone = (selZone===id? null : id); render(); }
function mapView(){
  const z = ZONES.find(z=>z.id===selZone);
  const legend = Object.entries(STATUS_COLOR).map(([s,c])=>`<span style="margin-right:14px;font-size:12px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:4px"></span>${s}</span>`).join("");
  return `
  <div class="banner">The <b>Global Map</b> — every mission is a pin, every zone tells you where help is needed. Click a zone for details, click a pin for its mission.</div>
  <div class="card"><h2>Territory map</h2>${mapSVG()}<div style="margin-top:10px">${legend}</div></div>
  ${z? `<div class="card"><h2>${z.name}</h2>${missionTable(db.missions.filter(m=>m.zone===z.name))}</div>`
     : `<div class="card"><p class="muted">Select a zone on the map to see its missions.</p></div>`}`;
}

/* ---- Patron ---- */
function patronView(){
  const i = impactFor("Val (Patron)");
  return `
  <div class="banner">You are <b>Val (Patron)</b>. Fund a cleanup → it becomes a live mission → a Doer executes it → validation converts your money into verified impact below.</div>
  <div class="row">
    <div class="card"><h2>Fund a cleanup (mock payment)</h2>
      <label>Zone</label><select id="fz">${ZONES.map(z=>`<option>${z.name}</option>`).join("")}</select>
      <label>Amount (BGN)</label><input id="fa" type="number" value="25" min="5" step="5">
      <div class="muted" style="margin-top:8px">BGN × ${P.BGN_EUR} → EUR × ${P.EUR_EC} (0.25% fee) → EC · ${P.EC_PER_KG} EC = 1 kg</div>
      <div class="muted" id="fpreview"></div>
      <button class="act" onclick="doFund()">Pay & spawn mission</button>
    </div>
    <div class="card"><h2>Your verified impact</h2>
      <div class="impact">
        <div class="itile"><div class="v">${i.missions}</div><div class="l">Missions validated</div></div>
        <div class="itile"><div class="v">${fmt(i.kg,1)}</div><div class="l">kg removed</div></div>
        <div class="itile"><div class="v">${fmt(i.m2,0)}</div><div class="l">m² cleaned</div></div>
        <div class="itile"><div class="v">${fmt(i.co2,1)}</div><div class="l">kg CO₂ offset</div></div>
      </div>
      <p class="muted">Only validated missions count — that is the platform's core promise.</p>
    </div>
  </div>
  <div class="card"><h2>Your funded missions</h2>${missionTable(db.missions.filter(m=>m.patron==="Val (Patron)"))}</div>`;
}
function doFund(){
  const bgn = parseFloat(document.getElementById("fa").value);
  if(!(bgn>0)) return toast("Enter a valid amount");
  const m = fundMission(document.getElementById("fz").value, bgn);
  toast("Mission "+m.id+" funded: "+fmt(m.ec)+" EC → target "+fmt(m.kg)+" kg"); render();
}

/* ---- Doer ---- */
function doerView(){
  const xp = db.xp["Maria (Doer)"]||0, L = levelFor(xp), N = nextLevel(xp);
  const pctXP = N? Math.min(100, Math.round(100*(xp-L.xp)/(N.xp-L.xp))) : 100;
  const avail = db.missions.filter(m=>m.status==="Available");
  const mine = db.missions.filter(m=>m.doer==="Maria (Doer)");
  return `
  <div class="banner">You are <b>Maria (Doer)</b> · <span class="lvl">${L.name}</span> · ${db.kc["Maria (Doer)"]||0} KC</div>
  <div class="card"><h2>Maturity progress</h2>
    <div class="xpbar"><div class="xpfill" style="width:${pctXP}%"></div></div>
    <span class="muted">${xp} XP ${N? "· "+(N.xp-xp)+" XP to "+N.name : "· max level reached"} — XP comes only from validated missions (${P.XP_PER_MISSION} per mission + ${P.XP_PER_KG}/kg)</span></div>
  <div class="card"><h2>Mission queue — available</h2>
    ${missionTable(avail, m=>`<button class="sec" onclick="claim('${m.id}');toast('${m.id} claimed');render()">Claim</button>`)}</div>
  <div class="card"><h2>My missions</h2>
    ${missionTable(mine, m=> m.status==="Claimed" ?
      `<button class="sec" onclick="openEvidence('${m.id}')">Submit evidence</button>` :
      (m.status==="Submitted"?`<span class="muted">awaiting review</span>`:""))}</div>
  <div class="card" id="evcard" style="display:none"><h2>Evidence for <span id="evid-id"></span></h2>
    <div class="row">
      <div style="flex:1;min-width:220px"><label>BEFORE photo</label>
        <input type="file" id="evbefore" accept="image/*" capture="environment" onchange="previewImg(this,'pv-b')">
        <img id="pv-b" class="preview" style="display:none"></div>
      <div style="flex:1;min-width:220px"><label>AFTER photo</label>
        <input type="file" id="evafter" accept="image/*" capture="environment" onchange="previewImg(this,'pv-a')">
        <img id="pv-a" class="preview" style="display:none"></div>
    </div>
    <label>GPS</label><div class="muted">Simulated: 42.68N, 23.32E (±8 m) · timestamp auto — real geolocation arrives with the production build</div>
    <button class="act" onclick="doSubmit()">Submit for validation</button></div>`;
}
let evTarget=null;
function openEvidence(id){ evTarget=id; document.getElementById("evcard").style.display="block"; document.getElementById("evid-id").textContent=id; window.scrollTo(0,document.body.scrollHeight); }
function previewImg(inp, target){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=e=>{ const im=document.getElementById(target); im.src=e.target.result; im.style.display="block"; }; r.readAsDataURL(f);
}
function readAsData(inp){ return new Promise(res=>{ const f=inp.files[0]; if(!f) return res(null); const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); }); }
async function doSubmit(){
  const before = await readAsData(document.getElementById("evbefore"));
  const after  = await readAsData(document.getElementById("evafter"));
  submitEvidence(evTarget, before, after, "42.68N, 23.32E");
  evTarget=null; toast("Evidence submitted — pending admin validation"); render();
}

/* ---- Admin ---- */
function adminView(){
  const q = db.missions.filter(m=>m.status==="Submitted");
  const i = impactFor(null);
  return `
  <div class="banner">You are the <b>platform admin</b>. Review submitted evidence — approve to release rewards and credit impact.</div>
  <div class="card"><h2>Validation review queue (${q.length})</h2>
    ${q.length? `<table><tr><th>ID</th><th>Zone</th><th>Doer</th><th>Evidence</th><th>GPS</th><th>Actions</th></tr>`+
      q.map(m=>`<tr><td>${m.id}</td><td>${m.zone}</td><td>${m.doer}</td>
        <td>${m.evidence&&m.evidence.before?`<img class="evid" src="${m.evidence.before}" title="before">`:`<span class="muted">no before</span> `}
            ${m.evidence&&m.evidence.after?`<img class="evid" src="${m.evidence.after}" title="after">`:`<span class="muted">no after</span>`}</td>
        <td class="muted">${m.evidence? m.evidence.gps+" · "+m.evidence.ts : "—"}</td>
        <td><button class="sec" onclick="doValidate('${m.id}',true)">Approve</button>
            <button class="sec danger" onclick="doValidate('${m.id}',false)">Reject</button></td></tr>`).join("")+`</table>`
      : `<p class="muted">Queue is empty.</p>`}</div>
  <div class="card"><h2>Platform totals</h2>
    <span class="stat"><span class="v">${db.missions.length}</span><br><span class="l">missions</span></span>
    <span class="stat"><span class="v">${i.missions}</span><br><span class="l">validated</span></span>
    <span class="stat"><span class="v">${fmt(i.kg,1)}</span><br><span class="l">kg verified</span></span>
    <span class="stat"><span class="v">${fmt(i.m2,0)}</span><br><span class="l">m² cleaned</span></span>
    <span class="stat"><span class="v">${fmt(i.co2,1)}</span><br><span class="l">kg CO₂</span></span>
  </div>
  <div class="card"><h2>All missions & audit trail</h2>
    ${db.missions.map(m=>`<h3>${m.id} · ${m.zone} ${pill(m.status)}</h3>
      <div class="muted">${m.history.map(h=>"· "+h).join("<br>")}</div>`).join("") || '<p class="muted">No missions yet.</p>'}</div>
  <div class="card"><h2>Danger zone</h2>
    <button class="sec danger" onclick="if(confirm('Wipe all prototype data?')){localStorage.removeItem(DB_KEY);location.reload()}">Reset all data</button></div>`;
}
function doValidate(id, ok){
  validate(id, ok);
  const m = get(id);
  if(ok && m._levelUp){ toast(id+" validated — rewards released. "+m.doer+" leveled up: "+m._levelUp+"!"); delete m._levelUp; save(); }
  else toast(ok? id+" validated — rewards released" : id+" rejected");
  render();
}

/* ---- Ledger ---- */
function ledgerView(){
  return `
  <div class="banner">The <b>Eco Coin ledger</b> — every movement is an internal ledger entry. No real money moves inside the platform (escrow model). Cash-out is disabled in the pilot.</div>
  <div class="card"><h2>EC ledger entries</h2>
    ${db.ecLedger.length? `<table><tr><th>Time</th><th>Account</th><th>Type</th><th>EC</th><th>Note</th></tr>`+
      db.ecLedger.map(e=>`<tr><td class="muted">${e.ts}</td><td>${e.who}</td><td>${e.type}</td><td>${fmt(e.ec)}</td><td class="muted">${e.note}</td></tr>`).join("")+`</table>`
      : `<p class="muted">No entries yet — fund a mission first.</p>`}</div>
  <div class="card"><h2>Karma Coins & XP</h2>
    ${Object.keys(db.kc).map(k=>{
      const L=levelFor(db.xp[k]||0);
      return `<span class="stat"><span class="v">${db.kc[k]}</span><br><span class="l">${k} · KC</span></span>
              <span class="stat"><span class="v">${db.xp[k]||0}</span><br><span class="l">XP · ${L.name}</span></span>`;
    }).join("")}</div>`;
}

function render(){
  nav();
  const m = document.getElementById("main");
  m.innerHTML = view==="Patron"?patronView() : view==="Doer"?doerView() : view==="Map"?mapView() : view==="Admin"?adminView() : ledgerView();
  const fa = document.getElementById("fa");
  if(fa){ const upd=()=>{ const b=parseFloat(fa.value)||0, ec=bgnToEC(b);
    document.getElementById("fpreview").innerHTML = `<b>${fmt(b)} BGN → ${fmt(ec)} EC → ${fmt(ec/P.EC_PER_KG)} kg target</b>`; };
    fa.addEventListener("input",upd); upd(); }
}
render();
</script>
</body>
</html>
