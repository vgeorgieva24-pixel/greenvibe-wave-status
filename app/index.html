<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GreenVibe.Wave — MVP Prototype v0.23.4</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">

<style>
:root{--ink:#1c2b1e;--slate:#6b7a6d;--canvas:#f6f7fa;--card:#ffffff;--line:#e9edea;
 --green:#2e7d32;--leaf:#76b043;--mist:#a5d6a7;--cloud:#edf6ee;--deep:#0d2410;
 --r:16px;--sh:0 4px 18px rgba(20,40,25,.06)}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:"Century Gothic","CenturyGothic","Apple Gothic",AppleGothic,"URW Gothic L","Didact Gothic",Verdana,sans-serif;
 font-size:13px;background:var(--canvas);color:var(--ink);display:flex;min-height:100vh}
aside{width:236px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);
 display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh}
.slogo{display:block;margin:2px 6px 26px}
.slogo img{width:170px;display:block}
nav{display:flex;flex-direction:column;gap:6px}
nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:none;
 padding:11px 14px;border-radius:12px;font-size:13.5px;font-weight:700;color:var(--slate);cursor:pointer;font-family:inherit;transition:all .15s}
nav button:hover{background:var(--cloud);color:var(--ink)}
nav button.active{background:var(--cloud);color:var(--green);box-shadow:inset 0 0 0 1.5px var(--mist)}
nav button .ic{font-size:16px;width:22px;text-align:center}
.subnav{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px 30px;border-left:2px solid var(--cloud);padding-left:8px}
.subnav button{padding:7px 12px;font-size:12.5px;font-weight:700;color:var(--slate);border-radius:9px}
.subnav button.active{background:var(--cloud);color:var(--green);box-shadow:none}
.sfoot{margin-top:auto;display:flex;flex-direction:column;gap:12px;padding:6px}
.flags{display:flex;flex-wrap:wrap;gap:7px}
.flagbtn{padding:0;border:2px solid var(--line);border-radius:6px;cursor:pointer;background:none;line-height:0;opacity:.7;transition:all .15s}
.flagbtn:hover{opacity:1;transform:translateY(-1px)}
.flagbtn.active{border-color:var(--leaf);opacity:1;box-shadow:0 0 6px rgba(118,176,67,.4)}
.flagbtn svg{display:block;border-radius:3px;width:24px;height:16px}
.ver{font-size:9.5px;color:var(--slate);background:var(--canvas);border:1px solid var(--line);border-radius:999px;padding:5px 10px;text-align:center}
.shell{flex:1;min-width:0;display:flex;flex-direction:column}
main{max-width:none;width:100%;margin:0 auto;padding:26px 34px;flex:1}
.gwrap{display:flex;gap:20px;align-items:flex-start}
.gmain{flex:2.4;min-width:0}
.sidestats{flex:1;min-width:240px;max-width:330px;position:sticky;top:14px}
.sidestats .card{padding:16px 18px}
.sidestats .stat .v{transition:color .3s}
@keyframes glowp{0%,100%{box-shadow:var(--sh)}50%{box-shadow:0 6px 26px rgba(118,176,67,.35)}}
.sidestats .card.live{animation:glowp 4s infinite}
@media(max-width:1000px){.gwrap{flex-direction:column}.sidestats{position:static;max-width:none;width:100%}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 24px;margin-bottom:18px;box-shadow:var(--sh)}
h2{font-size:14.5px;color:var(--ink);margin:0 0 14px;letter-spacing:.01em}
h3{font-size:12.5px;color:var(--green);margin:14px 0 6px}
.row{display:flex;gap:18px;flex-wrap:wrap}
.row .card{flex:1;min-width:280px}
.stat{display:inline-block;margin:0 24px 8px 0}
.stat .v{font-size:22px;font-weight:700;color:var(--green)}
.stat .l{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:.06em}
label{display:block;font-size:11px;color:var(--slate);margin:12px 0 5px;font-weight:700;letter-spacing:.02em}
input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:11px;font-size:13px;background:var(--card);font-family:inherit;color:var(--ink);transition:border .15s}
input:focus,select:focus{outline:none;border-color:var(--mist);box-shadow:0 0 0 3px rgba(165,214,167,.25)}
button.act{background:var(--green);color:#fff;border:none;padding:11px 22px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;margin-top:12px;font-family:inherit;box-shadow:0 4px 14px rgba(46,125,50,.25);transition:all .15s}
button.act:hover{background:#256b29;transform:translateY(-1px)}
button.sec{background:var(--cloud);color:var(--green);border:1px solid var(--mist);padding:7px 15px;border-radius:999px;font-weight:700;font-size:12px;cursor:pointer;margin:4px 6px 0 0;font-family:inherit;transition:all .15s}
button.sec:hover{background:var(--mist);color:var(--deep)}
button.danger{background:#fdf1f1;color:#c06c6c;border:1px solid #f0d5d5}
button.danger:hover{background:#f7dede;color:#a54848}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--slate);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1.5px solid var(--line);padding:8px 9px}
td{padding:9px;border-bottom:1px solid #f0f3f0;vertical-align:top}
.pill{padding:3px 11px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.s-Available{background:#eaf2fa;color:#5b8cba} .s-Claimed{background:#f2ecfa;color:#9a7cc4}
.s-Submitted{background:#fbf3e2;color:#bd9048} .s-Validated{background:var(--cloud);color:#5a9463} .s-Rejected{background:#faeaea;color:#c07878}
.muted{color:var(--slate);font-size:11.5px}
.banner{background:var(--cloud);border:1px solid var(--mist);padding:13px 18px;border-radius:var(--r);font-size:12.5px;margin-bottom:18px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--deep);color:#fff;padding:13px 20px;border-radius:14px;font-size:13px;box-shadow:0 10px 30px rgba(13,36,16,.35);opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px;z-index:1200}
.toast.show{opacity:1}
.evid{max-width:120px;max-height:80px;border-radius:10px;border:1px solid var(--line);margin:4px 6px 0 0}
.impact{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.itile{background:var(--cloud);border-radius:14px;padding:13px 17px;min-width:118px}
.itile .v{font-size:19px;font-weight:700;color:var(--green)} .itile .l{font-size:10px;color:var(--slate)}
.xpbar{background:#eceeec;border-radius:999px;height:12px;overflow:hidden;margin:6px 0 3px}
.xpfill{background:linear-gradient(90deg,var(--mist),var(--leaf));height:100%;border-radius:999px;transition:width .4s}
.lvl{display:inline-block;background:var(--cloud);color:var(--green);border:1px solid var(--mist);border-radius:999px;padding:3px 12px;font-size:11px;font-weight:700}
.preview{max-width:160px;max-height:110px;border-radius:12px;border:2px solid var(--cloud);display:block;margin-top:6px}
#geomap{height:540px;border-radius:14px}
.mapwrap{position:relative}
.mapcredit{position:absolute;bottom:8px;right:12px;z-index:5;font-size:10px;color:var(--slate);background:rgba(255,255,255,.85);padding:3px 9px;border-radius:8px;pointer-events:none}
.tint-soft .maplibregl-canvas{filter:sepia(.10) hue-rotate(50deg) saturate(.65) brightness(1.05)}
.filters{display:flex;gap:13px;flex-wrap:wrap;align-items:center;margin-bottom:13px}
.filters label{display:flex;align-items:center;gap:6px;margin:0;font-size:12px;color:var(--ink);font-weight:700;cursor:pointer}
.filters input{width:auto}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.25)}
.maplibregl-popup-content{font-family:inherit;font-size:12.5px;border-radius:12px;box-shadow:var(--sh)}
footer{text-align:center;color:var(--slate);font-size:10.5px;padding:18px}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
main .card{animation:cardIn .45s ease both}
main .card:nth-child(2){animation-delay:.06s} main .card:nth-child(3){animation-delay:.12s}
main .card:nth-child(4){animation-delay:.18s} main .card:nth-child(5){animation-delay:.24s}
main .card:hover{transform:translateY(-2px);transition:transform .18s;box-shadow:0 8px 26px rgba(20,40,25,.10)}
.mini{margin:14px 0 4px}
.mini h4{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:.07em;margin:0 0 6px;display:flex;align-items:center;gap:6px}
.livedot{width:8px;height:8px;border-radius:50%;background:#e05a5a;animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#minimap{height:130px;border-radius:12px;cursor:pointer;border:1px solid var(--line)}
.minievent{font-size:10.5px;color:var(--slate);margin-top:6px;line-height:1.35;min-height:28px}
#topbar{display:flex;gap:18px;align-items:center;padding:18px 34px;min-height:64px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:950;flex-wrap:wrap}
.langwrap{position:relative}
#langbtn{display:flex;align-items:center;gap:7px;background:var(--canvas);border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;font-weight:700;font-size:11px;color:var(--slate)}
.langmenu{position:absolute;right:0;top:110%;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 40px rgba(13,36,16,.2);padding:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;z-index:1300;min-width:230px}
.langmenu button{border:2px solid transparent;border-radius:7px;background:none;cursor:pointer;padding:2px;line-height:0}
.langmenu button.active{border-color:var(--leaf)}
.tb-left{display:flex;flex-direction:column;align-items:flex-start;gap:3px;min-width:220px}
.tb-line{font-size:11.5px;color:var(--slate)}
.tb-left .who{font-weight:700;font-size:14px}
.tb-chip{background:var(--cloud);color:var(--green);border-radius:999px;padding:3px 10px;font-size:10.5px;font-weight:700;white-space:nowrap}
.tb-mid{flex:1;text-align:center;min-width:160px}
.tb-ad{display:inline-block;font-size:11.5px;color:var(--slate);background:var(--canvas);border:1px dashed var(--line);border-radius:999px;padding:6px 18px;animation:cardIn .5s ease both}
.tb-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.tb-right .flags{display:flex;gap:4px;flex-wrap:wrap;max-width:420px}
.tb-btn{background:var(--green);color:#fff;border-radius:999px;padding:7px 14px;font-size:11px;font-weight:700;text-decoration:none;border:none;cursor:pointer}
.tb-btn.ghost{background:var(--cloud);color:var(--green)}
#crumbs{padding:8px 34px;font-size:11.5px;color:var(--slate);border-bottom:1px solid var(--line);background:var(--canvas)}
#crumbs a{color:var(--green);font-weight:700;text-decoration:none;cursor:pointer}
.tickwrap{max-width:none;width:100%;margin:0 auto;padding:14px 34px 0}
.ticker{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:999px;
 padding:9px 18px;box-shadow:var(--sh);overflow:hidden}
.ticker .tk{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;animation:cardIn .4s ease both;cursor:pointer}
.zonecover{width:100%;height:86px;object-fit:cover;border-radius:12px;margin-bottom:10px;display:block}
.thumb{width:34px;height:24px;border-radius:5px;object-fit:cover;vertical-align:middle;border:1px solid var(--line)}
.regwrap{display:flex;gap:18px;align-items:flex-start}
.regmain{flex:1.6;min-width:0}.regside{flex:1;min-width:230px;position:sticky;top:16px}
.regside .card{padding:16px}
.tipbox{background:var(--cloud);border:1px solid var(--mist);border-radius:12px;padding:10px 14px;font-size:12px;margin:10px 0}
.typepills{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.typepills button{border-radius:999px;padding:6px 14px;font-size:11.5px;font-weight:700;background:var(--card);border:1.5px solid var(--line);color:var(--slate)}
.typepills button.on{background:var(--cloud);border-color:var(--leaf);color:var(--green)}
.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.zcard{position:relative;border:2px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);transition:transform .15s,border-color .15s}
.zcard:hover{transform:translateY(-2px)}
.zcard.sel{border-color:var(--leaf);box-shadow:0 6px 18px rgba(46,125,50,.18)}
.zcard img{width:100%;height:64px;object-fit:cover;display:block;margin:0}
.zcard .zc-n{padding:8px 10px;font-size:11.5px;font-weight:700}
.zcard .zc-t{position:absolute;top:6px;left:6px;background:rgba(255,255,255,.9);border-radius:999px;padding:2px 8px;font-size:10.5px;font-weight:700}
.zcard .zc-ck{position:absolute;top:6px;right:8px;font-size:16px;opacity:0;transition:opacity .15s}
.zcard.sel .zc-ck{opacity:1}
#regmap{height:230px;border-radius:14px;border:1px solid var(--line);margin-bottom:12px}
.regpin{width:26px;height:26px;border-radius:50%;background:#fff;border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(13,36,16,.25);transition:transform .15s}
.regpin:hover{transform:scale(1.2)}
.regpin.sel{border-color:var(--green);background:var(--cloud);transform:scale(1.15)}
.billtog{display:flex;justify-content:center;margin:4px 0 16px}
.billtog div{display:flex;background:var(--cloud);border-radius:999px;padding:4px;gap:2px}
.billtog button{border-radius:999px;padding:8px 22px;font-size:12px;font-weight:700;color:var(--slate);background:transparent;border:none}
.billtog button.on{background:var(--card);color:var(--green);box-shadow:0 2px 8px rgba(20,40,25,.12)}
.savetag{background:var(--cloud);color:var(--green);border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:6px}
.plangrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px}
.plancard .pc-eq{font-size:10.5px;color:var(--slate);margin-top:2px}
.regmain .card h2{font-size:17px}
.regmain input{padding:12px 14px;font-size:13px;border-radius:12px}
.regmain .act{width:100%;padding:13px;font-size:13.5px;border-radius:999px;margin-top:14px}
.planchips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}
.planchips button{border-radius:999px;padding:9px 16px;font-size:11.5px;font-weight:700;background:var(--card);border:1.5px solid var(--line);color:var(--slate)}
.planchips button.on{background:var(--cloud);border-color:var(--leaf);color:var(--green)}
.regsub{color:var(--slate);font-size:12px;margin:-6px 0 14px}
.regtrust{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:10.5px;color:var(--slate);text-align:center}
.plancard{position:relative;border:2px solid var(--line);border-radius:16px;padding:16px 14px;text-align:center;cursor:pointer;background:var(--card);transition:transform .15s,border-color .15s}
.plancard:hover{transform:translateY(-3px)}
.plancard.sel{border-color:var(--leaf);box-shadow:0 10px 26px rgba(46,125,50,.16)}
.plancard .pc-price{font-size:26px;font-weight:700;color:var(--green)}.plancard .pc-per{font-size:10.5px;color:var(--slate)}
.plancard ul{list-style:none;margin:10px 0 0;padding:0;text-align:left;font-size:11px;color:var(--slate)}
.plancard li{padding:3px 0;border-bottom:1px dashed var(--line)}
.ribbon{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--leaf);color:#fff;border-radius:999px;padding:3px 12px;font-size:10px;font-weight:700;white-space:nowrap}
.tour-hl{position:relative;z-index:1201!important;outline:3px solid var(--leaf);outline-offset:3px;border-radius:14px;box-shadow:0 0 0 6px rgba(118,176,67,.25)}
.tourdim{position:fixed;inset:0;background:rgba(13,36,16,.45);z-index:1200}
.tourbox{position:fixed;z-index:1202;background:var(--card);border-radius:16px;padding:16px 18px;max-width:300px;box-shadow:0 16px 44px rgba(13,36,16,.3);animation:cardIn .3s ease both}
.tourbox h4{margin:0 0 6px;font-size:13px;color:var(--green)}
.tourbox p{margin:0 0 10px;font-size:12px;line-height:1.45}
.tourbox .muted{font-size:10.5px}
@media(max-width:900px){.regwrap{flex-direction:column}.regside{position:static}}
.nudge{position:fixed;bottom:24px;left:260px;background:var(--card);border:1.5px solid var(--mist);border-radius:16px;
 padding:14px 18px;box-shadow:0 12px 34px rgba(13,36,16,.18);z-index:1150;max-width:320px;animation:cardIn .4s ease both}
@media(max-width:900px){.nudge{left:16px}.tickwrap{padding:12px 16px 0}}
.overlay{position:fixed;inset:0;background:rgba(13,36,16,.45);display:flex;align-items:center;justify-content:center;z-index:1100;padding:20px}
.modal{max-width:600px;width:100%;max-height:82vh;overflow:auto;margin:0}
.badge{margin-left:auto;background:var(--leaf);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:2px 7px;min-width:18px;text-align:center}
@media (max-width:900px){
 body{flex-direction:column}
 aside{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:wrap;gap:10px;padding:12px 16px}
 .slogo{margin:0}.slogo img{width:130px}
 nav{flex-direction:row;flex-wrap:wrap}
 .sfoot{margin:0 0 0 auto;flex-direction:row;align-items:center}
 .ver{display:none}}
</style>

}catch(e){}})();

function svgPhoto(kind, seed){
  const r = (n)=>{ seed=(seed*9301+49297)%233280; return (seed/233280)*n; };
  let blobs="";
  if(kind==="before"){
    for(let i=0;i<9;i++) blobs+=`<ellipse cx="${10+r(140)}" cy="${55+r(50)}" rx="${4+r(9)}" ry="${3+r(5)}" fill="${["#8d7b64","#9aa0a6","#6d6d6d","#b0a48c"][i%4]}"/>`;
    return "data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="160" height="110"><rect width="160" height="110" fill="#b7c9a8"/><rect y="80" width="160" height="30" fill="#a3b894"/>${blobs}<text x="6" y="14" font-size="10" fill="#5a5a5a">before</text></svg>`);
  }
  for(let i=0;i<4;i++) blobs+=`<circle cx="${20+r(120)}" cy="${20+r(30)}" r="1.6" fill="#fff" opacity=".9"/>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="160" height="110"><rect width="160" height="110" fill="#a5d6a7"/><rect y="80" width="160" height="30" fill="#8fc691"/>${blobs}<text x="6" y="14" font-size="10" fill="#2e7d32">after ✓</text></svg>`);
}
function daysAgo(n){ const d=new Date(Date.now()-n*864e5); return d.toISOString().slice(0,16).replace("T"," "); }
function seedWorld(){
  if(!db.events) db.events=[];
  if(!db.evseq) db.evseq=1;
  if(!db.seen) db.seen={Patron:0,Doer:0,Ambassador:0,Admin:0};
  let seed=7;
  const rnd=(n)=>{ seed=(seed*9301+49297)%233280; return Math.floor((seed/233280)*n); };
  const mk=(zone,status,bgn,doer,patron,ago,heart)=>{
    const ec=bgnToEC(bgn), kg=ec/P.EC_PER_KG;
    const m={ id:"GV-"+String(db.seq++).padStart(3,"0"), zone, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
      status, patron, doer:doer||null, loc:randLoc(zoneByName(zone)),
      evidence: (status==="Submitted"||status==="Validated")? {before:svgPhoto("before",seed+1), after:svgPhoto("after",seed+2), gps:"(community)", ts:daysAgo(ago)} : null,
      heart: !!heart,
      history:[daysAgo(ago+2)+" — Funded by "+patron, ...(doer?[daysAgo(ago+1)+" — Claimed by "+doer]:[]),
               ...(status==="Validated"?[daysAgo(ago)+" — Validated. Impact credited"]:[])] };
    db.missions.push(m);
    db.events.push({n:db.evseq++, ts:daysAgo(ago+2), type:"funded", mid:m.id, patron, zone, kg:m.kg});
    if(doer) db.events.push({n:db.evseq++, ts:daysAgo(ago+1), type:"claimed", mid:m.id, doer, patron, zone});
    if(status==="Validated"){ db.events.push({n:db.evseq++, ts:daysAgo(ago), type:"validated", mid:m.id, doer, patron, zone, kg:m.kg});
      if(heart) db.events.push({n:db.evseq++, ts:daysAgo(Math.max(0,ago-1)), type:"heart", mid:m.id, patron, doer, zone}); }
    return m;
  };
  const Z=ZONES.map(z=>z.name);
  for(let i=0;i<34;i++){
    const zone=Z[rnd(4)], patron=COMMUNITY.patrons[rnd(6)], doer=COMMUNITY.doers[rnd(6)];
    const bgn=[15,20,25,30,45,60][rnd(6)], ago=rnd(28);
    const roll=rnd(10);
    if(roll<5)      mk(zone,"Validated",bgn,doer,patron,ago,rnd(10)<4);
    else if(roll<7) mk(zone,"Available",bgn,null,patron,ago,false);
    else if(roll<9) mk(zone,"Claimed",bgn,doer,patron,ago,false);
    else            mk(zone,"Submitted",bgn,doer,patron,ago,false);
  }
  db.events.sort((x,y)=> (x.ts<y.ts?1:-1));
  db.worldSeeded=true; save();
}
if(!db.worldSeeded) seedWorld();
/* Ambient life: the world moves while you watch */
function ambientTick(){
  const r=Math.random();
  const doer=COMMUNITY.doers[Math.floor(Math.random()*6)];
  const patron=COMMUNITY.patrons[Math.floor(Math.random()*6)];
  if(r<0.35){
    const avail=db.missions.filter(m=>m.status==="Available");
    if(avail.length){ const m=avail[Math.floor(Math.random()*avail.length)];
      m.status="Claimed"; m.doer=doer; m.history.push(ts()+" — Claimed by "+doer);
      emit("claimed",{mid:m.id, doer, patron:m.patron, zone:m.zone}); }
  } else if(r<0.65){
    const cl=db.missions.filter(m=>m.status==="Claimed" && COMMUNITY.doers.includes(m.doer||""));
    if(cl.length){ const m=cl[Math.floor(Math.random()*cl.length)];
      m.status="Validated"; m.evidence={before:svgPhoto("before",Date.now()%1000),after:svgPhoto("after",Date.now()%997),gps:"(community)",ts:ts()};
      m.history.push(ts()+" — Validated. Impact credited");
      emit("validated",{mid:m.id, doer:m.doer, patron:m.patron, zone:m.zone, kg:m.kg}); }
  } else {
    const zone=ZONES[Math.floor(Math.random()*4)].name, bgn=[15,20,25,45][Math.floor(Math.random()*4)];
    const ec=bgnToEC(bgn), kg=ec/P.EC_PER_KG;
    const m={ id:"GV-"+String(db.seq++).padStart(3,"0"), zone, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
      status:"Available", patron, doer:null, loc:randLoc(zoneByName(zone)), evidence:null, heart:false,
      history:[ts()+" — Funded by "+patron] };
    db.missions.unshift(m);
    emit("funded",{mid:m.id, patron, zone, kg:m.kg});
  }
  save();
  if(typeof document!=="undefined" && document.getElementById("nav")) nav();
  if(view==="Pulse") render();
  if(view==="Map" && MAP) refreshOverlayData();
}
if(typeof setInterval!=="undefined") setInterval(ambientTick, 12000);

function randLoc(z){
  const a = Math.random()*2*Math.PI, d = Math.sqrt(Math.random())*z.r*0.75;
  return { lat:+(z.lat + (d*Math.cos(a))/111320).toFixed(6),
           lng:+(z.lng + (d*Math.sin(a))/(111320*Math.cos(z.lat*Math.PI/180))).toFixed(6) };
}
function cleanedRadius(kg){ const area = kg / P.KG_PER_M2; return Math.max(35, Math.sqrt(area/Math.PI)); }
function circlePoly(lat,lng,r,steps=48){
  const ring=[]; for(let i=0;i<=steps;i++){ const a=2*Math.PI*i/steps;
    ring.push([ lng + (r*Math.sin(a))/(111320*Math.cos(lat*Math.PI/180)), lat + (r*Math.cos(a))/111320 ]); }
  return ring;
}

/* ===== Domain logic ===== */
function bgnToEC(bgn){ return bgn * P.BGN_EUR * P.EUR_EC; }
function levelFor(xp){ let L=LEVELS[0]; for(const l of LEVELS){ if(xp>=l.xp) L=l; } return L; }
function nextLevel(xp){ return LEVELS.find(l=>l.xp>xp) || null; }
function fundMission(zoneName, bgn){
  const ec = bgnToEC(bgn), kg = ec / P.EC_PER_KG, z = zoneByName(zoneName);
  const m = { id:"GV-"+String(db.seq++).padStart(3,"0"), zone:zoneName, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
              status:"Available", patron:patronName(), doer:null, evidence:null, loc:randLoc(z),
              history:[ts()+" — Funded with "+fmt(bgn)+" BGN → "+fmt(ec)+" EC (mock payment)"] };
  db.ecLedger.push({ ts:ts(), who:patronName(), type:"Funding", ec:m.ec, note:m.id+" · "+zoneName });
  db.missions.unshift(m);

}

function submitEvidence(id, before, after, gps){
  const m=get(id); m.status="Submitted"; m.evidence={ before, after, gps, ts:ts() };
  m.history.push(ts()+" — Evidence submitted (before/after photos + GPS "+gps+")");

function validate(id, ok){
  const m=get(id);
  if(ok){
    m.status="Validated";
    const kc = Math.round(m.kg*P.KC_PER_KG + P.KC_MISSION_BONUS);
    const xp = Math.round(P.XP_PER_MISSION + m.kg*P.XP_PER_KG);
    db.kc[m.doer]=(db.kc[m.doer]||0)+kc;
    const before = levelFor(db.xp[m.doer]||0);
    db.xp[m.doer]=(db.xp[m.doer]||0)+xp;
    const afterL = levelFor(db.xp[m.doer]);
    db.ecLedger.push({ ts:ts(), who:m.doer, type:"Redemption accrual", ec:m.ec, note:m.id+" validated → EC accrues to Doer (cash-out disabled in pilot)" });
    m.history.push(ts()+" — Validated. +"+kc+" KC, +"+xp+" XP to "+m.doer);
    if(afterL.n>before.n){ m.history.push(ts()+" — "+m.doer+" leveled up: "+afterL.name); m._levelUp=afterL.name; }
    emit("validated",{mid:id, doer:m.doer, patron:m.patron, zone:m.zone, kg:m.kg});
  } else { m.status="Rejected"; m.history.push(ts()+" — Rejected by admin review"); emit("rejected",{mid:id, doer:m.doer, patron:m.patron, zone:m.zone}); }
  save();
}
function get(id){ return db.missions.find(m=>m.id===id); }
function impactFor(filter){
  const v = db.missions.filter(m=>m.status==="Validated" && (!filter||m.patron===filter));
  const kg = v.reduce((s,m)=>s+m.kg,0);
  return { missions:v.length, kg, m2:kg/P.KG_PER_M2, co2:kg*P.CO2_PER_KG };
}

          .replace("{id}", e.mid||"").replace("{z}", e.zone? zLabelByName(e.zone):"")
          .replace("{kg}", e.kg!=null? fmt(e.kg):"").replace("{n}", e.who||"").replace("{r}", e.role? tn("nav",e.role):"");

  if(role==="Doer")       return db.doer && (e.doer===db.doer.name || e.type==="funded");

function missionGeoJSON(){

function cleanedGeoJSON(){

function applyMapLanguage(){
  if(!MAP) return;
  const style = MAP.getStyle(); if(!style||!style.layers) return;
  style.layers.forEach(l=>{
    if(l.type==="symbol" && l.layout && l.layout["text-field"]){
      try{ MAP.setLayoutProperty(l.id, "text-field",
        ["coalesce", ["get","name:"+LANG], ["get","name:latin"], ["get","name"]]); }catch(e){}
    }
  });
}
function addOverlays(){
  if(!MAP) return;
  if(!MAP.getSource("zones")) MAP.addSource("zones",{type:"geojson",data:zonesGeoJSON()});
  if(!MAP.getSource("cleaned")) MAP.addSource("cleaned",{type:"geojson",data:cleanedGeoJSON()});
  if(!MAP.getSource("pins")) MAP.addSource("pins",{type:"geojson",data:missionGeoJSON()});
  if(!MAP.getLayer("zones-fill")) MAP.addLayer({id:"zones-fill",type:"fill",source:"zones",paint:{"fill-color":["case",["==",["get","mine"],1],"#f2c14e","#a5d6a7"],"fill-opacity":["case",["==",["get","mine"],1],0.25,0.18]}});
  if(!MAP.getLayer("zones-line")) MAP.addLayer({id:"zones-line",type:"line",source:"zones",paint:{"line-color":["case",["==",["get","mine"],1],"#e0a83a","#81c784"],"line-width":["case",["==",["get","mine"],1],3,1.5]}});
  if(!MAP.getLayer("cleaned-fill")) MAP.addLayer({id:"cleaned-fill",type:"fill",source:"cleaned",paint:{"fill-color":"#7fbf87","fill-opacity":0.35}});
  if(!MAP.getLayer("pins-c")) MAP.addLayer({id:"pins-c",type:"circle",source:"pins",
    paint:{"circle-radius":7,"circle-color":["get","color"],"circle-stroke-color":"#ffffff","circle-stroke-width":2}});
  applyMapLanguage();
}
function refreshOverlayData(){

function initMap(){
  const el = document.getElementById("geomap"); if(!el) return;
  if(typeof maplibregl==="undefined"){ el.innerHTML='<p class="muted" style="padding:20px">Map library unavailable (offline?).</p>'; return; }
  MAP = new maplibregl.Map({ container:"geomap", style: MAP_STYLES[MAPSTYLE]||MAP_STYLES.soft,
    center:[25.35,42.72], zoom:6.3, attributionControl:false });
  MAP.addControl(new maplibregl.NavigationControl({showCompass:false}), "top-left");
  applyTint();
  MAP.on("style.load", ()=>{ addOverlays(); });
  MAP.on("click","pins-c", e=>{
    const f=e.features && e.features[0]; if(!f) return;
    new maplibregl.Popup({closeButton:true}).setLngLat(f.geometry.coordinates).setHTML(f.properties.html).addTo(MAP);
    const mm=get(f.properties.id); const zz=mm&&ZONES.find(x=>x.name===mm.zone);
    if(zz) selectZone(zz.id);
  });
  MAP.on("click","zones-fill", e=>{
    const f=e.features && e.features[0]; if(!f) return;
    if(e.features.length && MAP.queryRenderedFeatures(e.point,{layers:["pins-c"]}).length) return;
    selectZone(f.properties.id);
    const z=ZONES.find(x=>x.id===f.properties.id);
    if(z) MAP.flyTo({center:[z.lng,z.lat], zoom:12.5});
  });
  MAP.on("mouseenter","pins-c",()=>MAP.getCanvas().style.cursor="pointer");
  MAP.on("mouseleave","pins-c",()=>MAP.getCanvas().style.cursor="");
  MAP.on("mouseenter","zones-fill",()=>MAP.getCanvas().style.cursor="pointer");
  MAP.on("mouseleave","zones-fill",()=>MAP.getCanvas().style.cursor="");
}

function patronStreak(){

  const months=new Set(db.missions.filter(m=>m.patron===p.name).map(missionMonth));
  let streak=0; const d=new Date();
  while(true){

    if(streak>120) break;
  }

function getGPS(missionId){
  return new Promise(res=>{
    const m = get(missionId);
    const fallback = m && m.loc ? m.loc.lat.toFixed(4)+"N, "+m.loc.lng.toFixed(4)+"E (zone)" : "unknown";
    if(!navigator.geolocation) return res(fallback);
    navigator.geolocation.getCurrentPosition(
      p=>res(p.coords.latitude.toFixed(4)+"N, "+p.coords.longitude.toFixed(4)+"E (±"+Math.round(p.coords.accuracy)+" m, live)"),
      ()=>res(fallback), {timeout:6000});
  });
}

  const refCard=`<div class="card"><h2>${t("referralsT")}</h2>
    ${A.referrals.length? `<table><tr><th>${t("refWho")}</th><th>${t("refRole")}</th><th>${t("refEC")}</th><th>${t("refComm")}</th><th>${t("thTime")}</th></tr>`+
      A.referrals.map(r=>`<tr><td>${r.name}</td><td>${tn("nav",r.role)||r.role}</td><td>${r.ec?fmt(r.ec):"—"}</td><td>${r.comm?fmt(r.comm):"—"}</td><td class="muted">${r.date}</td></tr>`).join("")+`</table>`
      : `<p class="muted">${t("noReferrals")}</p>`}</div>`;
  const closeCard=`<div class="card"><h2>${t("closeAccount")}</h2><p class="muted">${t("aCloseWarn")}</p>
    <button class="sec danger" onclick="closeAmb()">${t("closeAccount")}</button></div>`;
  switch(AVIEW){
    case "network":  return banner+networkImpactCard()+refCard;
    case "earnings": return banner+commCard+refCard;
    case "profile":  return banner+closeCard;
    default:         return banner+ambJourneyCard(A,conv,comm,L)+inboxCard("Ambassador")+levelCard+linkCard;
  }
}
function ambJourneyCard(A,conv,comm,L){
  const steps=[["aj1",true],["aj2",!!A.copied],["aj3",conv>0],["aj4",comm>0],["aj5",L.n>=2]];
  const nextIx=steps.findIndex(s=>!s[1]);
  return `<div class="card"><h2>🧭 ${t("ajT")}</h2><div class="row" style="gap:8px">${steps.map(([k,done],i)=>
    `<div style="flex:1;min-width:110px;text-align:center;padding:10px;border-radius:12px;${i===nextIx?"background:var(--cloud);border:1.5px solid var(--mist)":""}">
      <div style="font-size:20px">${done?"✅":(i===nextIx?"👉":"•")}</div><div style="font-size:11.5px;font-weight:700">${t(k)}</div></div>`).join("")}</div>
    ${nextIx<0?`<p class="muted" style="margin-top:8px">${t("ajDone")}</p>`:""}</div>`;
}

/* ---- Admin ---- */
let ADMIN_ON = sessionStorage.getItem("gvw_admin")==="1";
function adminGateView(){
  return `<div class="banner">${t("adminGate")}</div>
    <div class="card"><h2>${t("adminGate")}</h2>
      <label>${t("adminPin")}</label><input id="apin" type="password" style="max-width:220px">
      <button class="act" onclick="adminLogin()">${t("enter")}</button></div>`;
}
function adminLogin(){
  const v=(document.getElementById("apin")||{}).value||"";
  if(v!=="1111") return toast(t("wrongPin"));
  ADMIN_ON=true; sessionStorage.setItem("gvw_admin","1"); render();
}
function adminLogout(){ ADMIN_ON=false; sessionStorage.removeItem("gvw_admin"); render(); }
function zoneActive(z){ return !db.zoff || !db.zoff.includes(z.id); }
function toggleZone(zid){
  db.zoff = db.zoff||[];
  db.zoff = db.zoff.includes(zid) ? db.zoff.filter(x=>x!==zid) : [...db.zoff, zid];
  save(); render();
}
function platformUsers(){
  const u=[];
  if(db.patron) u.push({role:"Patron",name:db.patron.name,key:"patron"});
  if(db.doer)   u.push({role:"Doer",name:db.doer.name,key:"doer"});
  if(db.amb)    u.push({role:"Ambassador",name:db.amb.name,key:"amb"});
  return u;
}
function toggleSuspend(key){
  db.susp=db.susp||{};
  db.susp[key]=!db.susp[key]; save(); render();
}
function kcAdjust(){
  if(!db.doer) return;
  const v=parseInt((document.getElementById("kadj")||{}).value||"0",10);
  if(!v) return;
  db.kc[db.doer.name]=(db.kc[db.doer.name]||0)+v; save();
  toast(t("adjusted")+": "+(v>0?"+":"")+v+" KC"); render();
}
function adminView(){
  if(!ADMIN_ON) return adminGateView();
  const q = db.missions.filter(m=>m.status==="Submitted");
  const i = impactFor(null);
  const users = platformUsers();
  return `
  ${inboxCard("Admin")}
  <div class="banner">${t("adminBanner")} <button class="sec" style="float:right" onclick="adminLogout()">${t("logout")}</button></div>
  <div class="row">
    <div class="card"><h2>${t("zonesMgmt")}</h2>
      <table><tr><th>${t("thZone")}</th><th>${t("thStatus")}</th><th></th></tr>
      ${ZONES.map(z=>`<tr><td>${zLabel(z)}</td>
        <td>${zoneActive(z)?`<span class="pill s-Validated">${t("zActive")}</span>`:`<span class="pill s-Rejected">${t("zInactive")}</span>`}</td>
        <td><button class="sec" onclick="toggleZone('${z.id}')">${zoneActive(z)?t("deactivate"):t("activate")}</button></td></tr>`).join("")}</table></div>
    <div class="card"><h2>${t("usersMgmt")}</h2>
      ${users.length? `<table><tr><th>${t("uName")}</th><th>${t("uRole")}</th><th>${t("uStatus")}</th><th></th></tr>`+
        users.map(u=>{const s=db.susp&&db.susp[u.key];
          return `<tr><td>${u.name}</td><td>${tn("nav",u.role)}</td>
          <td>${s?`<span class="pill s-Rejected">${t("suspended")}</span>`:`<span class="pill s-Validated">${t("active")}</span>`}</td>
          <td><button class="sec" onclick="toggleSuspend('${u.key}')">${s?t("unsuspend"):t("suspend")}</button></td></tr>`;}).join("")+`</table>`
        : `<p class="muted">${t("noUsers")}</p>`}
      ${db.doer? `<label>${t("kcAdjust")} — ${db.doer.name}</label>
        <div style="display:flex;gap:8px"><input id="kadj" type="number" value="10" style="max-width:120px">
        <button class="sec" onclick="kcAdjust()">${t("apply")}</button></div>`:""}</div>
  </div>
  <div class="card"><h2>${t("reviewQueue")} (${q.length})</h2>
    ${q.length? `<table><tr><th>${t("thId")}</th><th>${t("thZone")}</th><th>${t("thDoer")}</th><th>${t("evidence")}</th><th>GPS</th><th></th></tr>`+
      q.map(m=>`<tr><td>${m.id}</td><td>${zLabelByName(m.zone)}</td><td>${m.doer}</td>
        <td>${m.evidence&&m.evidence.before?`<img class="evid" src="${m.evidence.before}">`:`<span class="muted">${t("noBefore")}</span> `}
            ${m.evidence&&m.evidence.after?`<img class="evid" src="${m.evidence.after}">`:`<span class="muted">${t("noAfter")}</span>`}</td>
        <td class="muted">${m.evidence? m.evidence.gps+" · "+m.evidence.ts : "—"}</td>
        <td><button class="sec" onclick="doValidate('${m.id}',true)">${t("approve")}</button>
            <button class="sec danger" onclick="doValidate('${m.id}',false)">${t("reject")}</button></td></tr>`).join("")+`</table>`
      : `<p class="muted">${t("queueEmpty")}</p>`}</div>
  <div class="card"><h2>${t("totals")}</h2>
    <span class="stat"><span class="v">${db.missions.length}</span><br><span class="l">${t("missions")}</span></span>
    <span class="stat"><span class="v">${i.missions}</span><br><span class="l">${t("validated")}</span></span>
    <span class="stat"><span class="v">${fmt(i.kg,1)}</span><br><span class="l">${t("kgVerified")}</span></span>
    <span class="stat"><span class="v">${fmt(i.m2,0)}</span><br><span class="l">m²</span></span>
    <span class="stat"><span class="v">${fmt(i.co2,1)}</span><br><span class="l">CO₂</span></span></div>
  <div class="card"><h2>${t("audit")}</h2>
    ${db.missions.map(m=>`<h3>${m.id} · ${zLabelByName(m.zone)} ${pill(m.status)}</h3>
      <div class="muted">${m.history.map(h=>"· "+h).join("<br>")}</div>`).join("") || `<p class="muted">${t("noMissions")}</p>`}</div>
  <div class="card"><h2>${t("danger")}</h2>
    <button class="sec danger" onclick="if(confirm(t('resetConfirm'))){localStorage.removeItem(DB_KEY);location.reload()}">${t("reset")}</button></div>`;
}
function doValidate(id, ok){
  validate(id, ok);
  const m = get(id);
  if(ok && m._levelUp){ toast(id+" "+t("rewardsReleased")+". "+m.doer+" — "+t("levelUp")+": "+m._levelUp+"!"); delete m._levelUp; save(); }
  else toast(ok? id+" "+t("rewardsReleased") : id+" "+t("rejected"));
  render();
}

/* ---- Ledger ---- */
function ledgerView(){
  return `
  <div class="banner">${t("ledgerBanner")}</div>
  <div class="card"><h2>${t("ledgerEntries")}</h2>
    ${db.ecLedger.length? `<table><tr><th>${t("thTime")}</th><th>${t("thAccount")}</th><th>${t("thType")}</th><th>EC</th><th>${t("thNote")}</th></tr>`+
      db.ecLedger.map(e=>`<tr><td class="muted">${e.ts}</td><td>${e.who}</td><td>${e.type}</td><td>${fmt(e.ec)}</td><td class="muted">${e.note}</td></tr>`).join("")+`</table>`
      : `<p class="muted">${t("noEntries")}</p>`}</div>
  <div class="card"><h2>${t("kcxp")}</h2>
    ${Object.keys(db.kc).map(k=>{
      const L=levelFor(db.xp[k]||0);
      return `<span class="stat"><span class="v">${db.kc[k]}</span><br><span class="l">${k} · KC</span></span>
              <span class="stat"><span class="v">${db.xp[k]||0}</span><br><span class="l">XP · ${L.name}</span></span>`;
    }).join("")}</div>`;
}

function render(){
  if(MAP){ try{MAP.remove();}catch(e){} MAP=null; }
  nav();
  const m = document.getElementById("main");
  if(["Patron","Doer","Ambassador","Admin"].includes(view)) markSeen(view);
  m.innerHTML = view==="Map"?mapView() : view==="Pulse"?pulseView() : view==="Patron"?patronView() : view==="Doer"?doerView() : view==="Ambassador"?ambView() : view==="Admin"?adminView() : ledgerView();
  if(view==="Map") initMap();
  const fa = document.getElementById("fa");
  if(fa){ const upd=()=>{ const b=parseFloat(fa.value)||0, ec=bgnToEC(b);
    document.getElementById("fpreview").innerHTML = `<b>${fmt(b)} BGN → ${fmt(ec)} EC → ${fmt(ec/P.EC_PER_KG)} kg</b>`; };
    fa.addEventListener("input",upd); upd(); }
  if(typeof requestAnimationFrame!=="undefined") requestAnimationFrame(countUp);
  initRegMap();
}
applyDir();
render();
if(typeof location!=="undefined" && location.hash && location.hash.indexOf("#patron")===0){
  const hp=location.hash.split(":");
  if(hp[1] && PLANS.some(p=>p.id===hp[1])){ REG.plan=hp[1]; }
  if(hp[2]==="y"||hp[2]==="m"){ BILLCYC=hp[2]; REG.billing=hp[2]==="y"?"year":"month"; }
  view="Patron"; render();
}
handlePaidReturn();
initMini(); refreshMini(); refreshTicker();
if(typeof setTimeout!=="undefined"){ setTimeout(welcomePopup, 1200); armIdle(); }
</script>
</body>
</html>
