<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<title>GreenVibe.Wave — MVP Prototype v0.5</title>

<style>
:root{--green:#2e7d32;--dark:#1b5e20;--light:#e8f3e8;--amber:#b47d00;--red:#c0392b;--grey:#6b7a6d}
*{box-sizing:border-box}
body{font-family:"Century Gothic","CenturyGothic","Apple Gothic",AppleGothic,"URW Gothic L","Didact Gothic",Verdana,sans-serif;font-size:13px;margin:0;background:#f4f7f4;color:#212121}
header{background:#0d2410;color:#fff;padding:0;display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 28px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08)}
.mainbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;padding:18px 28px;border-bottom:3px solid #76b043}
header .tag{font-size:10px;background:rgba(255,255,255,.14);padding:3px 10px;border-radius:999px}
nav{display:flex;gap:6px;flex-wrap:wrap}
nav button{border:none;padding:10px 19px;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;font-family:inherit}
nav button.active{background:#fff;color:var(--dark)}
.langsel{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:7px 10px;font-weight:700;font-size:12px;font-family:inherit}
.langsel option{color:#212121}
.flags{display:flex;gap:7px;align-items:center}
.flagbtn{padding:0;border:2px solid rgba(255,255,255,.35);border-radius:5px;cursor:pointer;background:none;line-height:0;opacity:.75;transition:all .15s}
.flagbtn:hover{opacity:1;transform:translateY(-1px)}
.flagbtn.active{border-color:#fff;opacity:1;box-shadow:0 0 8px rgba(255,255,255,.45)}
.flagbtn svg{display:block;border-radius:2.5px;width:21px;height:15px}
.flags{gap:6px}
main{max-width:1100px;margin:0 auto;padding:22px 26px}
.card{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h2{font-size:14px;color:var(--dark);margin:0 0 12px}
h3{font-size:12.5px;color:var(--green);margin:14px 0 6px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row .card{flex:1;min-width:280px}
.stat{display:inline-block;margin:0 24px 8px 0}
.stat .v{font-size:22px;font-weight:700;color:var(--dark)}
.stat .l{font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:.05em}
label{display:block;font-size:11.5px;color:var(--grey);margin:10px 0 4px;font-weight:700}
input,select{width:100%;padding:8px 10px;border:1px solid #cfd8cf;border-radius:7px;font-size:13px;background:#fff;font-family:inherit}
button.act{background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-top:12px;font-family:inherit}
button.act:hover{background:var(--dark)}
button.sec{background:#eef2ee;color:var(--dark);border:1px solid #cfd8cf;padding:6px 13px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;margin:4px 6px 0 0;font-family:inherit}
button.danger{background:#fbeaea;color:var(--red);border:1px solid #eec7c7}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:#546e57;font-size:10.5px;text-transform:uppercase;border-bottom:2px solid #dfe7df;padding:7px 8px}
td{padding:7px 8px;border-bottom:1px solid #eef2ee;vertical-align:top}
.pill{padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.s-Available{background:#e3f0fb;color:#4a7fae} .s-Claimed{background:#f3e8fa;color:#9a6cc0}
.s-Submitted{background:#fdf1dc;color:#c08c3a} .s-Validated{background:var(--light);color:#5a9463} .s-Rejected{background:#f8dfe0;color:#c06c6c}
.muted{color:var(--grey);font-size:11.5px}
.banner{background:var(--light);border-left:4px solid #a5d6a7;padding:10px 14px;border-radius:6px;font-size:12.5px;margin-bottom:14px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.25);opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px;z-index:1200}
.toast.show{opacity:1}
.evid{max-width:120px;max-height:80px;border-radius:6px;border:1px solid #dfe7df;margin:4px 6px 0 0}
.impact{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.itile{background:var(--light);border-radius:9px;padding:11px 15px;min-width:115px}
.itile .v{font-size:18px;font-weight:700;color:var(--dark)} .itile .l{font-size:10px;color:var(--grey)}
.xpbar{background:#e0e6e0;border-radius:999px;height:13px;overflow:hidden;margin:6px 0 2px}
.xpfill{background:linear-gradient(90deg,#a5d6a7,#81c784);height:100%;border-radius:999px;transition:width .4s}
.lvl{display:inline-block;background:var(--dark);color:#fff;border-radius:999px;padding:3px 12px;font-size:11px;font-weight:700}
.preview{max-width:160px;max-height:110px;border-radius:8px;border:2px solid var(--light);display:block;margin-top:6px}
#geomap{height:540px;border-radius:10px}
.mapwrap{position:relative}
.mapcredit{position:absolute;bottom:6px;right:10px;z-index:5;font-size:10px;color:#546e57;background:rgba(255,255,255,.78);padding:2px 8px;border-radius:6px;pointer-events:none}
.tint-soft .maplibregl-canvas{filter:sepia(.10) hue-rotate(50deg) saturate(.65) brightness(1.05)}
.filters{display:flex;gap:13px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filters label{display:flex;align-items:center;gap:6px;margin:0;font-size:12px;color:#212121;font-weight:700;cursor:pointer}
.filters input{width:auto}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.35)}
.maplibregl-popup-content{font-family:inherit;font-size:12.5px;border-radius:8px}
footer{text-align:center;color:var(--grey);font-size:10.5px;padding:16px}
</style>

let LANG = localStorage.getItem("gvw_lang") || "bg";
function t(k){ const d=I18N[LANG]||I18N.en; return (k in d? d[k] : (I18N.en[k] ?? k)); }
function tn(group,k){ const d=I18N[LANG]||I18N.en; return (d[group]&&d[group][k]) || (I18N.en[group]&&I18N.en[group][k]) || k; }
function setLang(l){ LANG=l; localStorage.setItem("gvw_lang",l); render(); }

/* ===== State ===== */
const DB_KEY = "gvw_proto_v0";
let db = JSON.parse(localStorage.getItem(DB_KEY) || "null") || { ecLedger:[], missions:[], kc:{"Maria (Doer)":0}, seq:1 };
if (db.xp === undefined) db.xp = { "Maria (Doer)": 0 };
db.missions.forEach(m => {
  if (m.evidence && m.evidence.photo !== undefined && m.evidence.before === undefined) { m.evidence.before = null; m.evidence.after = m.evidence.photo; }
  if (!m.loc) m.loc = randLoc(zoneByName(m.zone));
});
function seedDemo(){
  const specs = [
    ["Sofia — Borisova Gradina","Validated",30],["Sofia — Borisova Gradina","Available",20],
    ["Sofia — Vitosha Foothills","Claimed",25],["Plovdiv — Maritsa Riverbank","Validated",45],
    ["Plovdiv — Maritsa Riverbank","Available",18],["Varna — Asparuhovo Beach","Submitted",22],
    ["Varna — Asparuhovo Beach","Available",15]];
  specs.forEach(([zone,status,bgn])=>{
    const ec = bgnToEC(bgn), kg = ec / P.EC_PER_KG;
    db.missions.push({ id:"GV-"+String(db.seq++).padStart(3,"0"), zone, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
      status, patron:"Demo Patron", doer: status==="Available"? null : "Demo Doer",
      evidence:null, loc: randLoc(zoneByName(zone)), history:["Demo mission (seeded for preview)"] });
  });
  save();
}
if (db.missions.length === 0) seedDemo();
function save(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function toast(m){ const el=document.getElementById("toast"); el.textContent=m; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"), 3400); }
function fmt(n,d=2){ return Number(n).toLocaleString("en-US",{maximumFractionDigits:d,minimumFractionDigits:0}); }
function ts(){ return new Date().toISOString().slice(0,16).replace("T"," "); }

/* ===== Geo helpers ===== */
function zoneByName(n){ return ZONES.find(z=>z.name===n) || ZONES[0]; }
function zLabel(z){ return tn("zones", z.id); }
function zLabelByName(name){ const z=ZONES.find(x=>x.name===name); return z? zLabel(z) : name; }
function randLoc(z){
  const a = Math.random()*2*Math.PI, d = Math.sqrt(Math.random())*z.r*0.75;
  return { lat:+(z.lat + (d*Math.cos(a))/111320).toFixed(6),
           lng:+(z.lng + (d*Math.sin(a))/(111320*Math.cos(z.lat*Math.PI/180))).toFixed(6) };
}
function cleanedRadius(kg){ const area = kg / P.KG_PER_M2; return Math.max(35, Math.sqrt(area/Math.PI)); }
function circlePoly(lat,lng,r,steps=48){
  const ring=[]; for(let i=0;i<=steps;i++){ const a=2*Math.PI*i/steps;
    ring.push([ lng + (r*Math.sin(a))/(111320*Math.cos(lat*Math.PI/180)), lat + (r*Math.cos(a))/111320 ]); }
  return ring;
}

/* ===== Domain logic ===== */
function bgnToEC(bgn){ return bgn * P.BGN_EUR * P.EUR_EC; }
function levelFor(xp){ let L=LEVELS[0]; for(const l of LEVELS){ if(xp>=l.xp) L=l; } return L; }
function nextLevel(xp){ return LEVELS.find(l=>l.xp>xp) || null; }
function fundMission(zoneName, bgn){
  const ec = bgnToEC(bgn), kg = ec / P.EC_PER_KG, z = zoneByName(zoneName);
  const m = { id:"GV-"+String(db.seq++).padStart(3,"0"), zone:zoneName, ec:+ec.toFixed(2), kg:+kg.toFixed(2),
              status:"Available", patron:patronName(), doer:null, evidence:null, loc:randLoc(z),
              history:[ts()+" — Funded with "+fmt(bgn)+" BGN → "+fmt(ec)+" EC (mock payment)"] };
  db.ecLedger.push({ ts:ts(), who:patronName(), type:"Funding", ec:m.ec, note:m.id+" · "+zoneName });
  db.missions.unshift(m); save(); return m;
}
function claim(id){ const m=get(id); m.status="Claimed"; m.doer="Maria (Doer)"; m.history.push(ts()+" — Claimed by Maria"); save(); }
function submitEvidence(id, before, after, gps){
  const m=get(id); m.status="Submitted"; m.evidence={ before, after, gps, ts:ts() };
  m.history.push(ts()+" — Evidence submitted (before/after photos + GPS "+gps+")"); save();
}
function validate(id, ok){
  const m=get(id);
  if(ok){
    m.status="Validated";
    const kc = Math.round(m.kg*P.KC_PER_KG + P.KC_MISSION_BONUS);
    const xp = Math.round(P.XP_PER_MISSION + m.kg*P.XP_PER_KG);
    db.kc[m.doer]=(db.kc[m.doer]||0)+kc;
    const before = levelFor(db.xp[m.doer]||0);
    db.xp[m.doer]=(db.xp[m.doer]||0)+xp;
    const afterL = levelFor(db.xp[m.doer]);
    db.ecLedger.push({ ts:ts(), who:m.doer, type:"Redemption accrual", ec:m.ec, note:m.id+" validated → EC accrues to Doer (cash-out disabled in pilot)" });
    m.history.push(ts()+" — Validated. +"+kc+" KC, +"+xp+" XP to "+m.doer);
    if(afterL.n>before.n){ m.history.push(ts()+" — "+m.doer+" leveled up: "+afterL.name); m._levelUp=afterL.name; }
  } else { m.status="Rejected"; m.history.push(ts()+" — Rejected by admin review"); }
  save();
}
function get(id){ return db.missions.find(m=>m.id===id); }
function impactFor(filter){
  const v = db.missions.filter(m=>m.status==="Validated" && (!filter||m.patron===filter));
  const kg = v.reduce((s,m)=>s+m.kg,0);
  return { missions:v.length, kg, m2:kg/P.KG_PER_M2, co2:kg*P.CO2_PER_KG };
}

const VIEWS = ["Map","Patron","Doer","Admin","Ledger"];
let view="Map", MAP=null, SELZ=null;

const MAP_STYLES = { soft:"https://tiles.openfreemap.org/styles/positron",

                     classic:"https://tiles.openfreemap.org/styles/liberty" };

function renderFlags(){
  const c = document.getElementById("langflags"); if(!c) return;
  c.innerHTML = Object.keys(FLAGS).map(l=>
    `<button class="flagbtn ${l===LANG?'active':''}" onclick="setLang('${l}')" title="${l.toUpperCase()}">${FLAGS[l]}</button>`).join("");
}
function nav(){
  document.getElementById("nav").innerHTML = VIEWS.map(v=>`<button class="${v===view?'active':''}" onclick="go('${v}')">${tn("nav",v)}</button>`).join("");
  renderFlags();
  const tg=document.querySelector("[data-i18n=tagline]"); if(tg) tg.textContent=t("tagline");
  document.getElementById("foot").textContent = t("footer");
}
function go(v){ view=v; render(); }
function pill(s){ return `<span class="pill s-${s}">${tn("status",s)}</span>`; }
function missionTable(list, actions){
  if(!list.length) return `<p class="muted">${t("nothing")}</p>`;
  return `<table><tr><th>${t("thId")}</th><th>${t("thZone")}</th><th>EC</th><th>${t("thKg")}</th><th>${t("thStatus")}</th><th>${t("thDoer")}</th><th></th></tr>`+
    list.map(m=>`<tr><td>${m.id}</td><td>${zLabelByName(m.zone)}</td><td>${fmt(m.ec)}</td><td>${fmt(m.kg)}</td>
      <td>${pill(m.status)}</td><td>${m.doer||"—"}</td><td>${actions?actions(m):""}</td></tr>`).join("")+`</table>`;
}

/* ---- Map (MapLibre GL + OpenFreeMap vector tiles) ---- */
function mapView(){
  const fl = Object.keys(STATUS_COLOR).map(s=>
    `<label><input type="checkbox" ${FILTERS[s]?"checked":""} onchange="setFilter('${s}',this.checked)">
     <span class="dot" style="background:${STATUS_COLOR[s]}"></span>${tn("status",s)}</label>`).join("");
  return `
  <div class="banner">${t("mapBanner")}</div>
  <div class="card">
    <div class="filters">${fl}
      <label><input type="checkbox" ${FILTERS.cleaned?"checked":""} onchange="setFilter('cleaned',this.checked)">
      <span class="dot" style="background:#7fbf87;opacity:.5"></span>${t("cleanedAreas")}</label>
      <label style="margin-left:auto">${t("style")}
        <select onchange="setMapStyle(this.value)" style="width:auto;padding:5px 8px">
          <option value="soft" ${MAPSTYLE==="soft"?"selected":""}>${t("styleSoft")}</option>
          <option value="vibe" ${MAPSTYLE==="vibe"?"selected":""}>${t("styleFresh")}</option>
          <option value="classic" ${MAPSTYLE==="classic"?"selected":""}>${t("styleClassic")}</option>
        </select></label>
    </div>
    <div class="mapwrap"><div id="geomap"></div><div class="mapcredit">© OpenStreetMap contributors · OpenFreeMap</div></div>
    <p class="muted" style="margin-top:8px">${t("mapNote")}</p>
  </div>
  <div class="card" id="zonepanel">${zonePanelHTML()}</div>`;
}
function zonePanelHTML(){
  if(!SELZ) return `<p class="muted">${t("zoneClick")}</p>`;
  const z = ZONES.find(x=>x.id===SELZ);
  const ms = db.missions.filter(m=>m.zone===z.name);
  const done = ms.filter(m=>m.status==="Validated");
  const kg = done.reduce((s,m)=>s+m.kg,0);
  return `<h2>${zLabel(z)}</h2>
    <span class="stat"><span class="v">${ms.length}</span><br><span class="l">${t("missions")}</span></span>
    <span class="stat"><span class="v">${done.length}</span><br><span class="l">${t("cleaned")}</span></span>
    <span class="stat"><span class="v">${fmt(kg,1)}</span><br><span class="l">${t("kgVerified")}</span></span>
    <span class="stat"><span class="v">${fmt(kg/P.KG_PER_M2,0)}</span><br><span class="l">m²</span></span>
    ${missionTable(ms)}`;
}
function setFilter(k,v){ FILTERS[k]=v; if(MAP) refreshOverlayData(); }
function setMapStyle(s){ MAPSTYLE=s; localStorage.setItem("gvw_mapstyle",s);
  if(MAP){ MAP.setStyle(MAP_STYLES[s]||MAP_STYLES.soft); applyTint(); } }
function selectZone(id){ SELZ=(SELZ===id?null:id); const p=document.getElementById("zonepanel"); if(p) p.innerHTML=zonePanelHTML(); }
function applyTint(){ const w=document.querySelector(".mapwrap"); if(w) w.classList.toggle("tint-soft", MAPSTYLE==="soft"); }

function missionGeoJSON(){
  return { type:"FeatureCollection", features: db.missions
    .filter(m=>m.loc && FILTERS[m.status])
    .map(m=>({ type:"Feature", geometry:{type:"Point",coordinates:[m.loc.lng,m.loc.lat]},
      properties:{ id:m.id, status:m.status, color:STATUS_COLOR[m.status]||"#999",
        html:`<b>${m.id}</b> · ${tn("status",m.status)}<br>${zLabelByName(m.zone)}<br>${fmt(m.kg)} kg ${t("target")} · ${fmt(m.ec)} EC<br><span style="color:#6b7a6d">${m.doer||t("waitingDoer")}</span>` } })) };
}
function cleanedGeoJSON(){
  return { type:"FeatureCollection", features: FILTERS.cleaned ? db.missions
    .filter(m=>m.status==="Validated" && m.loc)
    .map(m=>({ type:"Feature", geometry:{type:"Polygon",coordinates:[circlePoly(m.loc.lat,m.loc.lng,cleanedRadius(m.kg))]}, properties:{} })) : [] };
}
function zonesGeoJSON(){
  return { type:"FeatureCollection", features: ZONES.map(z=>({ type:"Feature",
    geometry:{type:"Polygon",coordinates:[circlePoly(z.lat,z.lng,z.r)]}, properties:{ id:z.id } })) };
}
function applyMapLanguage(){
  if(!MAP) return;
  const style = MAP.getStyle(); if(!style||!style.layers) return;
  style.layers.forEach(l=>{
    if(l.type==="symbol" && l.layout && l.layout["text-field"]){
      try{ MAP.setLayoutProperty(l.id, "text-field",
        ["coalesce", ["get","name:"+LANG], ["get","name:latin"], ["get","name"]]); }catch(e){}
    }
  });
}
function addOverlays(){
  if(!MAP) return;
  if(!MAP.getSource("zones")) MAP.addSource("zones",{type:"geojson",data:zonesGeoJSON()});
  if(!MAP.getSource("cleaned")) MAP.addSource("cleaned",{type:"geojson",data:cleanedGeoJSON()});
  if(!MAP.getSource("pins")) MAP.addSource("pins",{type:"geojson",data:missionGeoJSON()});
  if(!MAP.getLayer("zones-fill")) MAP.addLayer({id:"zones-fill",type:"fill",source:"zones",paint:{"fill-color":"#a5d6a7","fill-opacity":0.18}});
  if(!MAP.getLayer("zones-line")) MAP.addLayer({id:"zones-line",type:"line",source:"zones",paint:{"line-color":"#81c784","line-width":1.5}});
  if(!MAP.getLayer("cleaned-fill")) MAP.addLayer({id:"cleaned-fill",type:"fill",source:"cleaned",paint:{"fill-color":"#7fbf87","fill-opacity":0.35}});
  if(!MAP.getLayer("pins-c")) MAP.addLayer({id:"pins-c",type:"circle",source:"pins",
    paint:{"circle-radius":7,"circle-color":["get","color"],"circle-stroke-color":"#ffffff","circle-stroke-width":2}});
  applyMapLanguage();
}
function refreshOverlayData(){
  if(!MAP) return;
  const s1=MAP.getSource("pins"), s2=MAP.getSource("cleaned"), s3=MAP.getSource("zones");
  if(s1) s1.setData(missionGeoJSON());
  if(s2) s2.setData(cleanedGeoJSON());
  if(s3) s3.setData(zonesGeoJSON());
}
function initMap(){
  const el = document.getElementById("geomap"); if(!el) return;
  if(typeof maplibregl==="undefined"){ el.innerHTML='<p class="muted" style="padding:20px">Map library unavailable (offline?).</p>'; return; }
  MAP = new maplibregl.Map({ container:"geomap", style: MAP_STYLES[MAPSTYLE]||MAP_STYLES.soft,
    center:[25.35,42.72], zoom:6.3, attributionControl:false });
  MAP.addControl(new maplibregl.NavigationControl({showCompass:false}), "top-left");
  applyTint();
  MAP.on("style.load", ()=>{ addOverlays(); });
  MAP.on("click","pins-c", e=>{
    const f=e.features && e.features[0]; if(!f) return;
    new maplibregl.Popup({closeButton:true}).setLngLat(f.geometry.coordinates).setHTML(f.properties.html).addTo(MAP);
  });
  MAP.on("click","zones-fill", e=>{
    const f=e.features && e.features[0]; if(!f) return;
    if(e.features.length && MAP.queryRenderedFeatures(e.point,{layers:["pins-c"]}).length) return;
    selectZone(f.properties.id);
    const z=ZONES.find(x=>x.id===f.properties.id);
    if(z) MAP.flyTo({center:[z.lng,z.lat], zoom:12.5});
  });
  MAP.on("mouseenter","pins-c",()=>MAP.getCanvas().style.cursor="pointer");
  MAP.on("mouseleave","pins-c",()=>MAP.getCanvas().style.cursor="");
  MAP.on("mouseenter","zones-fill",()=>MAP.getCanvas().style.cursor="pointer");
  MAP.on("mouseleave","zones-fill",()=>MAP.getCanvas().style.cursor="");
}

let evTarget=null;
function openEvidence(id){ evTarget=id; document.getElementById("evcard").style.display="block"; document.getElementById("evid-id").textContent=id; window.scrollTo(0,document.body.scrollHeight); }
function previewImg(inp, target){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=e=>{ const im=document.getElementById(target); im.src=e.target.result; im.style.display="block"; }; r.readAsDataURL(f);
}
function readAsData(inp){ return new Promise(res=>{ const f=inp.files[0]; if(!f) return res(null); const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); }); }
function getGPS(missionId){
  return new Promise(res=>{
    const m = get(missionId);
    const fallback = m && m.loc ? m.loc.lat.toFixed(4)+"N, "+m.loc.lng.toFixed(4)+"E (zone)" : "unknown";
    if(!navigator.geolocation) return res(fallback);
    navigator.geolocation.getCurrentPosition(
      p=>res(p.coords.latitude.toFixed(4)+"N, "+p.coords.longitude.toFixed(4)+"E (±"+Math.round(p.coords.accuracy)+" m, live)"),
      ()=>res(fallback), {timeout:6000});
  });
}
async function doSubmit(){
  const id = evTarget;
  const before = await readAsData(document.getElementById("evbefore"));
  const after  = await readAsData(document.getElementById("evafter"));
  toast(t("capturing"));
  const gps = await getGPS(id);
  submitEvidence(id, before, after, gps);
  evTarget=null; toast(t("submitted")+" "+gps); render();
}

      <div class="muted">${m.history.map(h=>"· "+h).join("<br>")}</div>`).join("") || `<p class="muted">${t("noMissions")}</p>`}</div>
  <div class="card"><h2>${t("danger")}</h2>
    <button class="sec danger" onclick="if(confirm(t('resetConfirm'))){localStorage.removeItem(DB_KEY);location.reload()}">${t("reset")}</button></div>`;
}
function doValidate(id, ok){
  validate(id, ok);
  const m = get(id);
  if(ok && m._levelUp){ toast(id+" "+t("rewardsReleased")+". "+m.doer+" — "+t("levelUp")+": "+m._levelUp+"!"); delete m._levelUp; save(); }
  else toast(ok? id+" "+t("rewardsReleased") : id+" "+t("rejected"));
  render();
}

/* ---- Ledger ---- */
function ledgerView(){
  return `
  <div class="banner">${t("ledgerBanner")}</div>
  <div class="card"><h2>${t("ledgerEntries")}</h2>
    ${db.ecLedger.length? `<table><tr><th>${t("thTime")}</th><th>${t("thAccount")}</th><th>${t("thType")}</th><th>EC</th><th>${t("thNote")}</th></tr>`+
      db.ecLedger.map(e=>`<tr><td class="muted">${e.ts}</td><td>${e.who}</td><td>${e.type}</td><td>${fmt(e.ec)}</td><td class="muted">${e.note}</td></tr>`).join("")+`</table>`
      : `<p class="muted">${t("noEntries")}</p>`}</div>
  <div class="card"><h2>${t("kcxp")}</h2>
    ${Object.keys(db.kc).map(k=>{
      const L=levelFor(db.xp[k]||0);
      return `<span class="stat"><span class="v">${db.kc[k]}</span><br><span class="l">${k} · KC</span></span>
              <span class="stat"><span class="v">${db.xp[k]||0}</span><br><span class="l">XP · ${L.name}</span></span>`;
    }).join("")}</div>`;
}

function render(){
  if(MAP){ try{MAP.remove();}catch(e){} MAP=null; }
  nav();
  const m = document.getElementById("main");
  m.innerHTML = view==="Map"?mapView() : view==="Patron"?patronView() : view==="Doer"?doerView() : view==="Admin"?adminView() : ledgerView();
  if(view==="Map") initMap();
  const fa = document.getElementById("fa");
  if(fa){ const upd=()=>{ const b=parseFloat(fa.value)||0, ec=bgnToEC(b);
    document.getElementById("fpreview").innerHTML = `<b>${fmt(b)} BGN → ${fmt(ec)} EC → ${fmt(ec/P.EC_PER_KG)} kg</b>`; };
    fa.addEventListener("input",upd); upd(); }
}
render();
</script>
